; =============================================================================
; M5HAL - PlatformIO Configuration
;
; PlatformIO GUI policy:
;   Keep visible envs small enough for humans to choose by sight. Public
;   examples and the short M5Stack BASIC operation / benchmark menus stay
;   GUI-visible:
;     v1_exp_menu_*        (arduino / idf4 / idf5 / idf6)
;     v1_exp_bench_arduino
;     HowToUse_I2C_esp32
;     HowToUse_SPI_esp32
;     HowToUse_UART_esp32
;
; AI / CLI verification envs are kept in pio_envs/**/*.ini.cli and are
; intentionally not loaded by default (the extra_configs glob below only matches
; *.ini, so .ini.cli stays out of the GUI). Load them on demand by pointing the
; M5HAL_PIO_EXTRA_CONFIG env var at the file/glob — no copying. e.g.
;   M5HAL_PIO_EXTRA_CONFIG=pio_envs/v1/hil.ini.cli pio run -e v1_hil_uart_echo_host
;   M5HAL_PIO_EXTRA_CONFIG='pio_envs/*/check.ini.cli' pio run -e v1_check_native
; Unset, the var expands to empty and is ignored. See pio_envs/README.md.
;
; Naming convention inside the GUI-facing or *.ini.cli env files:
;   v0_check_*      : v0 public header (<M5HAL.hpp> shim -> M5HAL_v0.hpp)
;   v1_check_*      : v1 public header (<M5HAL_v1.hpp>)
;   v1_experiment_* : v1 experiment sketch build check
;   v1_exp_*        : short GUI-facing v1 experiment env
;   HowToUse_*      : short GUI-facing public v1 user examples
;   test_*          : unit test (native gtest)
;   v1_test_*       : v1 embedded test (PlatformIO Unity)
;
; version prefix を先頭に置く理由: alphabetical sort で version 単位にまとまる
; + `pio run -e v1_*` のような version 全件 build を視覚的に指定しやすい。
; ただし公開 examples は GUI 左ペインでの識別性を優先し、 v0 examples がない前提で
; `HowToUse_<Kind>_<chip>` の短い名前を使う。
;
; Examples:
;   pio run  -e v0_check_native
;   pio run  -e v1_check_esp32_espidf
;   pio test -e test_native
;   pio test -e v1_test_esp32_arduino_software_spi_wire
;   pio test -e v1_test_esp32_arduino_software_spi_wire_jumper
;
; M5Utility is referenced via the parallel local directory (../M5Utility).
; CI requires that parallel checkout. ArduinoIDE compatibility will be
; verified separately with arduino-cli.
;
; extra_configs は pio_envs/**/*.ini を読む。 普段は GUI-facing env と
; 利用者向け example env だけが `.ini` として残り、 check/test/advanced experiment env は
; *.ini.cli に退避する (`.cli` 拡張子は上記 glob に拾われないので GUI に出ない)。
; 必要な時だけ `${sysenv.M5HAL_PIO_EXTRA_CONFIG}` 行 (下記) 経由で env var にパス/グロブを
; 指定してロードする (コピー＝materialize は不要。 未設定時は空に展開され無視される)。
; 共通基底 ([common_*]) は本 file に残す。
; =============================================================================

[platformio]
core_dir = ../.platformio
default_envs = v1_exp_menu_arduino
extra_configs =
    pio_envs/v0/*.ini
    pio_envs/v1/*.ini
    ${sysenv.M5HAL_PIO_EXTRA_CONFIG}

; =============================================================================
; Common bases — orthogonal axes (platform / framework / board)
; =============================================================================

[common]
build_flags = -Wall -Wextra
lib_deps =
    symlink://../M5Utility

; --- Platform axis (chip / host OS) -----------------------------------------

[common_native]
extends = common
platform = native
; Native build compiles src/M5HAL_v1.cpp, which aggregates the bit-bang
; software variant via .inl includes. PlatformIO only picks .cpp/.c/.cc
; as compile units, so .inl files stay include-only.
; main() is provided by per-env build-check stubs under test/*/stub/
; (gated by #ifndef PIO_UNIT_TESTING so test_native's gtest main wins).
build_src_filter = +<*>
build_flags =
    ${common.build_flags}
    -O0
    -std=c++17
    -Wpedantic
    -Wconversion
    -Wsign-conversion
    -Wshadow
    -Wcast-qual
    -Wdouble-promotion

[common_esp32]
extends = common
; Pin the default ESP32 platform instead of relying on the latest registry
; release. CI has separate ESP-IDF major-version probes below, so ordinary
; check/example envs stay reproducible while newer toolchains are still watched.
platform = espressif32@6.12.0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -std=gnu++11
build_flags =
    ${common.build_flags}
    -std=gnu++17
    -O2

[common_esp32_espidf4]
extends = common_esp32
platform = espressif32@5.4.0

[common_esp32_espidf5]
extends = common_esp32
platform = espressif32@6.12.0
; Pin the exact toolchain this platform bundles. IDF5 (GCC14) and IDF6 (GCC15)
; share the `toolchain-xtensa-esp-elf` package name, so the last-installed one
; occupies the unversioned "active" slot. Pinning makes selection deterministic
; in a shared core_dir (the espidf cmake tool_version_check is strict). Update
; alongside the platform pin above. IDF4 uses a different package (toolchain-
; xtensa-esp32) and arduino does not hit this check, so neither needs a pin.
platform_packages =
    platformio/toolchain-xtensa-esp-elf@14.2.0+20241119

[common_esp32_espidf6]
extends = common_esp32
platform = espressif32@7.0.1
; See common_esp32_espidf5 note. IDF6 bundles the GCC15 toolchain.
platform_packages =
    platformio/toolchain-xtensa-esp-elf@15.2.0+20251204

; Future additions: common_rp2040, common_renesas_ra, ...

; --- Framework axis (SDK) ---------------------------------------------------

[common_arduino]
framework = arduino

[common_espidf]
framework = espidf

; --- Board axis -------------------------------------------------------------

[common_esp32dev]
extends = common_esp32
board = esp32dev

[common_esp32dev_espidf4]
extends = common_esp32_espidf4
board = esp32dev

[common_esp32dev_espidf5]
extends = common_esp32_espidf5
board = esp32dev

[common_esp32dev_espidf6]
extends = common_esp32_espidf6
board = esp32dev

[common_esp32s3dev]
extends = common_esp32
board = esp32-s3-devkitc-1

[common_esp32s3dev_espidf5]
extends = common_esp32_espidf5
board = esp32-s3-devkitc-1

[common_esp32s3dev_espidf6]
extends = common_esp32_espidf6
board = esp32-s3-devkitc-1

[common_esp32c3dev]
extends = common_esp32
board = esp32-c3-devkitm-1

[common_esp32c6dev]
extends = common_esp32
board = esp32-c6-devkitc-1

; Future additions: common_esp32h2dev, common_esp32p4dev, ...
; H2/P4 boards require platform upgrade (espressif32 v6.12.0 hardcodes
; riscv toolchain selection to c3/c6 only; H2/P4 are riscv but unrecognized).

; =============================================================================
; Test environments
; =============================================================================

[test_fw]
lib_deps =
    ${common.lib_deps}
    google/googletest@1.12.1

[env:test_native]
extends = common_native, test_fw
test_framework = googletest
test_filter = v1/native/*
; The native gtest exercises src/M5HAL_v1.cpp (aggregates the bit-bang
; software variant via .inl includes), so test_build_src is required to
; compile project sources alongside the tests.
test_build_src = true
