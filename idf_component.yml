description: Hardware Abstraction Layer (HAL) for M5Stack products.
url: https://github.com/m5stack/M5HAL
issues: https://github.com/m5stack/M5HAL/issues
license: MIT
version: "0.2.0-dev"

dependencies:
  idf: ">=4.4"
  m5stack/M5Utility:
    git: https://github.com/m5stack/M5Utility.git
    # Pin a released tag instead of `main` so component builds are
    # reproducible (library.json requires >=0.1.0 for the same reason).
    version: "0.1.0"

targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c2
  - esp32c3
  - esp32c5
  - esp32c6
  - esp32c61
  - esp32h2
  - esp32p4

# Ship only the library itself in the published ESP-IDF component (src + headers
# + CMakeLists + README + LICENSE). examples/ is excluded here because an IDF
# component never builds or consumes them; the PlatformIO package (library.json)
# intentionally KEEPS examples/ since Arduino / PlatformIO users do. Rationale:
# spec/reference/directory-layout.md (published-package excludes).
files:
  exclude:
    - "docs/**"
    - "examples/**"
    - "experiments/**"
    - "test/**"
    - "spec/**"
    - "pio_envs/**"
    - ".github/**"
    - "boards/**"
    - "platformio.ini"
    - "library.json"
    - "library.properties"
