; =============================================================================
; M5HAL — v1 GUI-facing experiments
;
; PlatformIO GUI に表示される entry は、人間が目視で選びやすいように
; 最小限に保つ。 M5Stack BASIC 実機で複数の小操作を選べる
; BoardMenu を experiments の正面入口にする。
;
; 高度な単機能測定・backend 差し替え env は
; pio_envs/v1/experiments_advanced.ini.cli に退避している。
;
; GUI / 通常実機確認:
;   pio run -e v1_exp_menu_arduino
; GUI / 性能測定:
;   pio run -e v1_exp_bench_arduino
; =============================================================================

[env:v1_exp_menu_arduino]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_menu_idf4]
extends = common_esp32dev_espidf4, common_espidf
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_menu_idf5]
extends = common_esp32dev_espidf5, common_espidf
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_menu_idf6]
extends = common_esp32dev_espidf6, common_espidf
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_bench_arduino]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../experiments/v1/BenchmarkMenu/BenchmarkMenu.cpp>
