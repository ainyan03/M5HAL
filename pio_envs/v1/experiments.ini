; =============================================================================
; M5HAL — v1 GUI-facing experiments
;
; PlatformIO GUI に表示される entry は、人間が目視で選びやすいように
; 最小限に保つ。 M5Stack BASIC 実機で複数の小操作を選べる
; BoardMenu を experiments の正面入口にする。
;
; 高度な単機能測定・backend 差し替え env は
; pio_envs/v1/experiments_advanced.ini.cli に退避している。
;
; GUI / 通常実機確認:
;   pio run -e v1_exp_menu_arduino
; GUI / 性能測定:
;   pio run -e v1_exp_bench_arduino
; GUI / リモートバス統合ハーネス (device + PC 側 CLI メニュー):
;   pio run -e v1_exp_remote_idf5 -t upload   (device、UART0 3Mbaud)
;   pio run -e v1_exp_remote_host             (PC 側、.pio/build/v1_exp_remote_host/program)
; =============================================================================

[env:v1_exp_menu_arduino]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_menu_idf4]
extends = common_esp32dev_espidf4, common_espidf
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_menu_idf5]
extends = common_esp32dev_espidf5, common_espidf
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_menu_idf6]
extends = common_esp32dev_espidf6, common_espidf
build_src_filter = +<*> +<../experiments/v1/BoardMenu/BoardMenu.cpp>

[env:v1_exp_bench_arduino]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../experiments/v1/BenchmarkMenu/BenchmarkMenu.cpp>

; --- リモートバス統合ハーネス (RemoteMenu、decisions/022-024 の常設受入環境) ---
; device 側は I2C (bus_id 0) + allowlist GPIO {39,38,37} を公開し、Core2 V1.1
; (AXP2101 probe で検出) では I2S (bus_id 1) も公開する。transport は UART0。
; WiFi/TCP transport 版は experiments_advanced.ini.cli (WiFi 資格情報前提)。
; PC 側 (v1_exp_remote_host) は serial/TCP 共用の CLI メニュー。

; arduino framework 版: I2S なし (arduino-esp32 2.x に IDF gen5 I2S が無い)。
; WiFi を include しない sketch の WiFi ゼロコスト対照でもある (ADR 024)。
[env:v1_exp_remote_arduino]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../experiments/v1/RemoteMenu/device/remote_menu_device.cpp>

; espidf 版: UART0 3Mbaud、Core2 V1.1 で I2S 公開 (IDF gen5 driver)。
[env:v1_exp_remote_idf5]
extends = common_esp32dev_espidf5, common_espidf
build_src_filter = +<*> +<../experiments/v1/RemoteMenu/device/remote_menu_device.cpp>

; PC 側 CLI メニュー (posix native、serial / tcp:<host>:<port> 共用)。
[env:v1_exp_remote_host]
extends = common_native
build_src_filter = +<*> +<../experiments/v1/RemoteMenu/host/remote_menu_host.cpp>
