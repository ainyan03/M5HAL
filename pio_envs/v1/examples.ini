; =============================================================================
; M5HAL — v1 user examples build check
;
; 配置は Arduino IDE 互換の `examples/v1/HowToUse/<Kind>/<Kind>.ino` に従う。
; 親フォルダ名で "HowToUse" を表し、末端の sketch 名は I2C / SPI / UART のように
; 対象 kind だけを示す。PlatformIO の build_src_filter は src_dir (= `src/`) からの
; 相対パスで `+<../pio_envs/v1/example_sources/...>` 指定し、公開 examples を
; build check に取り込む。PlatformIO は src_dir 外の `.ino` を sketch 変換しない
; ため、検証 env では薄い `.cpp` wrapper が公開 `.ino` を include する。
;
; 命名: HowToUse_<Kind>_<chip>
;   - examples は v1/HowToUse 配下に限定しているため `v1_example` は省く。
;   - Arduino IDE 互換 sketch を基本入口にするため `_arduino` も省く。
;   - 将来 ESP-IDF 専用 example を公開する場合だけ `_idf5` などを suffix する。
;
; examples は Arduino IDE でも単独で読める利用者向け sketch に限定する。
; build_flags で backend や runner 条件を差し替える検証用 sketch は
; pio_envs/v1/experiments.ini と experiments/v1/ に置く。
;
; 使い方:
;   pio run -e HowToUse_I2C_esp32
;   pio run -e HowToUse_I2C_esp32s3
;   pio run -e HowToUse_SPI_esp32
;   pio run -e HowToUse_SPI_esp32s3
;   pio run -e HowToUse_UART_esp32
;   pio run -e HowToUse_UART_esp32s3
;   pio run -e HowToUse_UARTEcho_esp32
;   pio run -e HowToUse_UARTEcho_esp32s3
;   pio run -e HowToUse_Bytecode_esp32     (M5Stack Core BASIC 前提のため esp32 のみ)
;
; リモートバス系の常設ハーネスは experiments/v1/RemoteMenu (v1_exp_remote_*) に
; 一本化した (旧 HowToUse_Remote* example は廃止統合)。
; =============================================================================

[env:HowToUse_I2C_esp32]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/I2C.cpp>

[env:HowToUse_I2C_esp32s3]
extends = common_esp32s3dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/I2C.cpp>

[env:HowToUse_SPI_esp32]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/SPI.cpp>

[env:HowToUse_SPI_esp32s3]
extends = common_esp32s3dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/SPI.cpp>

[env:HowToUse_UART_esp32]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/UART.cpp>

[env:HowToUse_UART_esp32s3]
extends = common_esp32s3dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/UART.cpp>

[env:HowToUse_UARTEcho_esp32]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/UARTEcho.cpp>

[env:HowToUse_UARTEcho_esp32s3]
extends = common_esp32s3dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/UARTEcho.cpp>

; CoreS3 (ESP32-S3) 専用: AW9523 + AW88298 アンプ、I2S BCK=34/WS=33/DOUT=13
; IDF gen5 I2S driver (driver/i2s_std.h) を使うため espidf5 プラットフォームが必要。
; PIO 公式 espressif32 platform の arduino framework は arduino-esp32 2.x (IDF 4.4 =
; legacy driver) のため I2S を申告しない。よってビルドチェックは espidf フレームワーク
; で行う（スケッチ本体は #ifdef ARDUINO で Arduino IDE (arduino-esp32 3.x = IDF5) と
; espidf の両対応）。
[env:HowToUse_I2SAudio_esp32s3]
extends = common_esp32s3dev_espidf5, common_espidf
build_src_filter = +<*> +<../pio_envs/v1/example_sources/I2SAudio.cpp>

; Core2 V1.1 (ESP32) 専用: AXP2101 + I2S BCK=12/WS=0/DOUT=2
; IDF gen5 I2S driver (driver/i2s_std.h) を使うため espidf5 プラットフォームが必要。
[env:HowToUse_I2SAudio_esp32]
extends = common_esp32dev_espidf5, common_espidf
build_src_filter = +<*> +<../pio_envs/v1/example_sources/I2SAudio.cpp>

; M5Stack Core BASIC 前提 (ボタン/IP5306/ILI9342C の固定ピン) のため esp32 のみ。
[env:HowToUse_Bytecode_esp32]
extends = common_esp32dev, common_arduino
build_src_filter = +<*> +<../pio_envs/v1/example_sources/Bytecode.cpp>

; リモートバス系 (旧 HowToUse_RemoteBus / RemoteBusTcp / RemoteI2S / RemoteI2STcp と
; その PC 側 host) は experiments/v1/RemoteMenu の統合ハーネス (v1_exp_remote_* /
; v1_exp_remote_host) に一本化した。
