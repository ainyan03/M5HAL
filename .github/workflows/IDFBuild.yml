# Fork-only official ESP-IDF component build check for the ainyan03/M5HAL fork.
#
# Builds M5HAL as an ESP-IDF component (test/idf_component_build) with the
# official `espressif/idf` toolchain across the full chip family — crucially
# including esp32-h2 and esp32-p4, which the PlatformIO `espressif32` platform
# cannot build (it ships no h2/p4 board files). Official ESP-IDF supports every
# chip M5HAL targets (see idf_component.yml `targets:`), so this is the
# authoritative, all-official verification lane. The PlatformIO
# fork-build-check covers esp32 / s3 / c3 / c6 across IDF 4/5/6 in parallel; the
# community pioarduino platform is deliberately NOT used as a verification gate.
#
# NOT part of the upstream m5stack PR:
#   - guarded by `if: github.repository == 'ainyan03/M5HAL'` so it stays inert
#     if ever merged upstream, and excluded from the official PR.
# (The upstream-template Arduino-Lint / clang-format workflows are dual-mode:
#  self-hosted on the m5stack org, free ubuntu runners on forks.)
#
# Modeled on the LovyanGFX / M5GFX / M5Unified `IDFBuild.yml` pattern, using the
# official image directly as the job container (no manual esp-idf clone). The
# tiny consumer project (test/idf_component_build) registers M5HAL + the sibling
# M5Utility checkout as components (IDF_COMPONENT_MANAGER=0 -> hermetic, no
# network deps) and compiles the shared v1 API surface (test/v1/build_check),
# which references PinBackup / ScopedPinBackup.
name: IDFBuild

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  idf-build:
    if: github.repository == 'ainyan03/M5HAL'
    name: idf ${{ matrix.idf }} ${{ matrix.target }}
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf }}
    strategy:
      fail-fast: false
      matrix:
        # Pin a recent IDF that supports the entire family incl. h2/p4. More
        # versions (release-v5.4, release-v5.3 ...) can be added; a dynamic
        # matrix driven by Espressif's idf_versions.js (as in upstream
        # LovyanGFX) is a possible follow-up.
        idf: ['release-v5.5']
        target: [esp32, esp32s3, esp32c3, esp32c6, esp32p4, esp32h2]
    steps:
      - name: Checkout M5HAL
        uses: actions/checkout@v6
        with:
          path: M5HAL

      - name: Checkout M5Utility (sibling component)
        uses: actions/checkout@v6
        with:
          repository: m5stack/M5Utility
          ref: develop
          path: M5Utility

      - name: Build M5HAL component for ${{ matrix.target }}
        shell: bash
        env:
          # Resolve deps only from the local EXTRA_COMPONENT_DIRS checkouts.
          IDF_COMPONENT_MANAGER: "0"
        run: |
          . "$IDF_PATH/export.sh"
          cd M5HAL/test/idf_component_build
          idf.py set-target ${{ matrix.target }} build
