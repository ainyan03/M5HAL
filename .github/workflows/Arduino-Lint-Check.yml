name: Arduino Lint Check
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Check
    # m5stack org uses its self-hosted runners; forks (no self-hosted runner)
    # fall back to the free GitHub-hosted runner. Same action either way.
    runs-on: ${{ github.repository_owner == 'm5stack' && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/arduino-lint-action@v2
        with:
          library-manager: update
          compliance: strict
          project-type: all
